name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Check formatting
        run: nix develop --command cargo fmt --all -- --check

      - name: Clippy
        run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: nix develop --command cargo build --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: prism_test
          POSTGRES_USER: prism
          POSTGRES_PASSWORD: prism
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://prism:prism@localhost:5432/prism_test
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Run migrations
        run: nix develop --command sqlx migrate run --source migrations

      - name: Run tests
        run: nix develop --command cargo test --workspace

  buf:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Lint
        run: nix develop --command buf lint

      - name: Breaking changes
        if: github.event_name == 'pull_request'
        run: nix develop --command buf breaking --against '.git#branch=${{ github.base_ref }}'

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Install dependencies
        run: nix develop --command bash -c "cd frontend && bun install --frozen-lockfile"

      - name: Type check
        run: nix develop --command bash -c "cd frontend && bun run typecheck"

      - name: Lint
        run: nix develop --command bash -c "cd frontend && bun run lint"

      - name: Test
        run: nix develop --command bash -c "cd frontend && bun run test"

  nix-build:
    name: Nix Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Build all packages
        run: nix build .#ps-server .#ps-workers .#ps-migrate .#psctl

      - name: Check flake
        run: nix flake check
