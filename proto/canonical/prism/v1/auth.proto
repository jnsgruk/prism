// Authentication and initial setup: user login, session management, and the
// first-run setup wizard. Backup operations are in backup.proto (BackupService).
syntax = "proto3";

package canonical.prism.v1;

import "google/protobuf/timestamp.proto";

// AuthService handles authentication, session management, and the initial
// setup wizard.
service AuthService {
  // GetSetupStatus returns whether the initial admin account has been created.
  rpc GetSetupStatus(GetSetupStatusRequest) returns (GetSetupStatusResponse);
  // CompleteSetup creates the first admin user and returns a session token.
  rpc CompleteSetup(CompleteSetupRequest) returns (CompleteSetupResponse);
  // Login authenticates a user by username and password.
  rpc Login(LoginRequest) returns (LoginResponse);
  // Logout invalidates the current session.
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  // GetCurrentUser returns the authenticated user's profile.
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);
}

message GetSetupStatusRequest {}

message GetSetupStatusResponse {
  // True once the initial admin account has been created.
  bool setup_complete = 1;
}

message CompleteSetupRequest {
  string username = 1;
  string display_name = 2;
  string password = 3;
}

message CompleteSetupResponse {
  // Session token for the newly created admin user.
  string session_token = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string session_token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message LogoutRequest {}

message LogoutResponse {}

message GetCurrentUserRequest {}

message GetCurrentUserResponse {
  string user_id = 1;
  string username = 2;
  string display_name = 3;
  // User role: "admin" or "viewer".
  string role = 4;
}
