// Administrative operations: API token management, data reset, and system
// info. All RPCs in this service require admin role authentication.
// Backup operations are in backup.proto (BackupService).
syntax = "proto3";

package canonical.prism.v1;

import "google/protobuf/timestamp.proto";

// AdminService provides privileged operations for instance administrators
// including API token lifecycle, data reset, and system info.
service AdminService {
  // CreateApiToken generates a new long-lived API token.
  rpc CreateApiToken(CreateApiTokenRequest) returns (CreateApiTokenResponse);
  // ListApiTokens returns metadata for all active API tokens.
  rpc ListApiTokens(ListApiTokensRequest) returns (ListApiTokensResponse);
  // RevokeApiToken permanently invalidates an API token.
  rpc RevokeApiToken(RevokeApiTokenRequest) returns (RevokeApiTokenResponse);
  // ResetData deletes all people, teams, and contributions. Requires confirm=true.
  rpc ResetData(ResetDataRequest) returns (ResetDataResponse);
  // GetSystemInfo returns storage usage statistics for the admin dashboard.
  rpc GetSystemInfo(GetSystemInfoRequest) returns (GetSystemInfoResponse);
}

message CreateApiTokenRequest {
  // Human-readable name for the token.
  string name = 1;
}

message CreateApiTokenResponse {
  string token_id = 1;
  // The token value. Only returned once at creation time.
  string token = 2;
  string name = 3;
}

message ListApiTokensRequest {}

message ListApiTokensResponse {
  repeated ApiTokenInfo tokens = 1;
}

// ApiTokenInfo contains metadata about an API token. The token value itself
// is never returned after creation.
message ApiTokenInfo {
  string token_id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
  // When the token was last used for authentication. Null if never used.
  google.protobuf.Timestamp last_used_at = 4;
}

message RevokeApiTokenRequest {
  string token_id = 1;
}

message RevokeApiTokenResponse {}

message ResetDataRequest {
  // Safety guard: must be true for the reset to proceed.
  bool confirm = 1;
}

message ResetDataResponse {
  int32 people_deleted = 1;
  int32 teams_deleted = 2;
  int32 contributions_deleted = 3;
}

message GetSystemInfoRequest {}

message GetSystemInfoResponse {
  // PostgreSQL database size in bytes.
  int64 database_size_bytes = 1;
  // Bytes used on the workspace PVC.
  int64 workspace_used_bytes = 2;
  // Total bytes available on the workspace PVC.
  int64 workspace_total_bytes = 3;
}
