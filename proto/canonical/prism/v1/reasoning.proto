// AI reasoning pipeline: provider configuration, model catalogue, cost
// tracking, enrichment lifecycle, and semantic similarity search via
// vector embeddings. Supports Google Gemini and OpenRouter providers.
syntax = "proto3";

package canonical.prism.v1;

import "canonical/prism/v1/common.proto";
import "google/protobuf/timestamp.proto";

// ReasoningService manages the AI reasoning pipeline — provider configuration,
// model discovery, cost tracking, enrichment execution, and vector-based
// semantic similarity search.
service ReasoningService {
  // GetAiSettings returns the current AI provider and model configuration.
  rpc GetAiSettings(GetAiSettingsRequest) returns (GetAiSettingsResponse);
  // UpdateAiSettings modifies AI provider, model, or budget configuration.
  rpc UpdateAiSettings(UpdateAiSettingsRequest) returns (UpdateAiSettingsResponse);
  // SetProviderSecret stores an encrypted API key for an AI provider.
  rpc SetProviderSecret(SetProviderSecretRequest) returns (SetProviderSecretResponse);
  // TestProvider verifies connectivity to an AI provider using its stored key.
  rpc TestProvider(TestProviderRequest) returns (TestProviderResponse);
  // GetStorageHealth checks connectivity to the S3/RustFS object store used
  // for embedding storage.
  rpc GetStorageHealth(GetStorageHealthRequest) returns (GetStorageHealthResponse);

  // GetCostSummary returns AI spend broken down by day, task, and model.
  rpc GetCostSummary(GetCostSummaryRequest) returns (GetCostSummaryResponse);

  // ListAiModels returns available models from configured AI providers.
  rpc ListAiModels(ListAiModelsRequest) returns (ListAiModelsResponse);
  // RefreshModelCatalogue triggers a background refresh of the model catalogue
  // from all configured providers.
  rpc RefreshModelCatalogue(RefreshModelCatalogueRequest) returns (RefreshModelCatalogueResponse);

  // GetEnrichments returns all enrichments for a single contribution.
  rpc GetEnrichments(GetEnrichmentsRequest) returns (GetEnrichmentsResponse);
  // GetEnrichmentsByContributions returns enrichments for multiple contributions.
  rpc GetEnrichmentsByContributions(GetEnrichmentsByContributionsRequest) returns (GetEnrichmentsByContributionsResponse);
  // GetEnrichmentPipelineStatus returns the current state of the enrichment pipeline.
  rpc GetEnrichmentPipelineStatus(GetEnrichmentPipelineStatusRequest) returns (GetEnrichmentPipelineStatusResponse);
  // DeleteEnrichmentsByType deletes all enrichments of a given type, allowing
  // re-enrichment with updated models or prompts.
  rpc DeleteEnrichmentsByType(DeleteEnrichmentsByTypeRequest) returns (DeleteEnrichmentsByTypeResponse);

  // FindSimilar returns contributions semantically similar to a given contribution
  // using vector embeddings.
  rpc FindSimilar(FindSimilarRequest) returns (FindSimilarResponse);
  // SearchByText returns contributions semantically matching a free-text query.
  rpc SearchByText(SearchByTextRequest) returns (SearchByTextResponse);
  // GetEmbeddingStatus returns the current state of the embedding pipeline.
  rpc GetEmbeddingStatus(GetEmbeddingStatusRequest) returns (GetEmbeddingStatusResponse);

  // AskQuestion sends a natural-language question to the agentic query interface.
  // Returns a server stream of events: container status, tool calls, partial answer,
  // artifact uploads, and final answer with reasoning trace.
  rpc AskQuestion(AskQuestionRequest) returns (stream AskQuestionResponse);
  // ResumeStream reconnects to an in-flight agentic query, replaying all
  // events from last_event_id (0 = start). Returns the same event stream
  // as AskQuestion. Terminates when the query completes or is cancelled.
  rpc ResumeStream(ResumeStreamRequest) returns (stream ResumeStreamResponse);
  // ListConversations returns the user's conversation history, newest first.
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
  // GetConversation returns a single conversation with its messages and artifacts.
  rpc GetConversation(GetConversationRequest) returns (GetConversationResponse);
  // SaveInsightFromConversation saves an agent answer as a persistent insight
  // snapshot, linking it back to the originating conversation.
  rpc SaveInsightFromConversation(SaveInsightFromConversationRequest) returns (SaveInsightFromConversationResponse);
  // DeleteConversation deletes a conversation and its messages, artifacts, and
  // events. If the conversation has an active container, it is also reaped.
  rpc DeleteConversation(DeleteConversationRequest) returns (DeleteConversationResponse);
  // RenameConversation sets a user-provided title on a conversation.
  rpc RenameConversation(RenameConversationRequest) returns (RenameConversationResponse);
  // GetArtifactDownloadUrl returns a pre-signed S3 URL for downloading an artifact.
  rpc GetArtifactDownloadUrl(GetArtifactDownloadUrlRequest) returns (GetArtifactDownloadUrlResponse);
}

// AiTaskConfig specifies the provider and model for a single AI task type.
message AiTaskConfig {
  // AI inference provider.
  AiProvider provider = 1;
  // Model identifier (e.g. "gemini-3.1-flash-lite", "anthropic/claude-sonnet-4").
  string model = 2;
}

// AiSettings holds the complete AI configuration for the instance.
message AiSettings {
  // Model used for contribution enrichment (review depth, sentiment, etc.).
  AiTaskConfig enrichment = 1;
  // Model used for insight generation.
  AiTaskConfig insights = 2;
  // Model used for agentic reasoning tasks.
  AiTaskConfig agentic = 3;
  // Model used for generating vector embeddings.
  AiTaskConfig embeddings = 4;
  // Monthly budget cap in USD. Null means unlimited.
  optional double budget_cap_usd = 5;
  // Map of provider name to whether an API key is stored (e.g. {"google": true}).
  map<string, bool> provider_secret_status = 6;
}

message GetAiSettingsRequest {}

message GetAiSettingsResponse {
  AiSettings settings = 1;
}

message UpdateAiSettingsRequest {
  optional AiTaskConfig enrichment = 1;
  optional AiTaskConfig insights = 2;
  optional AiTaskConfig agentic = 3;
  optional AiTaskConfig embeddings = 4;
  optional double budget_cap_usd = 5;
}

message UpdateAiSettingsResponse {
  AiSettings settings = 1;
}

message SetProviderSecretRequest {
  // AI inference provider.
  AiProvider provider = 1;
  // Plaintext API key. Encrypted at rest using AES-256-GCM.
  string secret_value = 2;
}

message SetProviderSecretResponse {}

message TestProviderRequest {
  // AI inference provider.
  AiProvider provider = 1;
}


message TestProviderResponse {
  bool success = 1;
  string error_message = 2;
}

message GetStorageHealthRequest {}

message GetStorageHealthResponse {
  bool healthy = 1;
  string error_message = 2;
}

// AiModelInfo describes a single AI model from a provider's catalogue.
message AiModelInfo {
  // Model identifier used in API calls.
  string id = 1;
  // AI inference provider.
  AiProvider provider = 2;
  // Human-readable model name.
  string display_name = 3;
  string description = 4;
  // Maximum context window in tokens.
  int32 context_length = 5;
  // Cost per million input tokens in USD.
  optional double input_price_per_million = 6;
  // Cost per million output tokens in USD.
  optional double output_price_per_million = 7;
  // Capabilities: "text", "embeddings", "vision", etc.
  repeated string capabilities = 8;
}

message ListAiModelsRequest {
  // Filter by provider. UNSPECIFIED returns all providers.
  AiProvider provider = 1;
  // Filter by capability (empty returns all).
  string capability = 2;
}

message ListAiModelsResponse {
  repeated AiModelInfo models = 1;
  // Map of provider name to last catalogue refresh time.
  map<string, google.protobuf.Timestamp> last_refreshed = 2;
}

message RefreshModelCatalogueRequest {}

message RefreshModelCatalogueResponse {
  // True if a refresh was started; false if one was already in progress.
  bool started = 1;
}

message GetCostSummaryRequest {
  // Number of days to include in the summary. Defaults to 7.
  int32 days = 1;
}

message GetCostSummaryResponse {
  double today_spend_usd = 1;
  optional double budget_cap_usd = 2;
  repeated DailySpend daily_spend = 3;
  repeated TaskSpend task_breakdown = 4;
  repeated ModelSpend model_breakdown = 5;
}

// DailySpend aggregates AI costs for a single day.
message DailySpend {
  // Date in YYYY-MM-DD format.
  string date = 1;
  double cost_usd = 2;
  int64 request_count = 3;
}

// TaskSpend aggregates AI costs for a single task type.
message TaskSpend {
  // Task type: "enrichment", "insights", "embeddings", etc.
  string task_type = 1;
  double cost_usd = 2;
  int64 prompt_tokens = 3;
  int64 completion_tokens = 4;
  int64 request_count = 5;
}

// ModelSpend aggregates AI costs for a specific provider + model + task combination.
message ModelSpend {
  AiProvider provider = 1;
  string model = 2;
  string task_type = 3;
  double cost_usd = 4;
  int64 prompt_tokens = 5;
  int64 completion_tokens = 6;
  int64 request_count = 7;
}

// Enrichment represents a single AI-generated annotation on a contribution.
message Enrichment {
  string id = 1;
  string contribution_id = 2;
  // Kind of enrichment.
  EnrichmentType enrichment_type = 3;
  // Structured JSON result (score, label, rationale).
  string value_json = 4;
  // AI model used to generate this enrichment.
  string model_name = 5;
  // Model confidence score (0.0–1.0).
  optional float confidence = 6;
  // SHA-256 hash of the input used for deduplication.
  optional string input_hash = 7;
  // Truncated preview of the input for debugging.
  optional string input_preview = 8;
  // When this enrichment was created.
  google.protobuf.Timestamp created_at = 9;
}

message GetEnrichmentsRequest {
  string contribution_id = 1;
}

message GetEnrichmentsResponse {
  repeated Enrichment enrichments = 1;
}

message GetEnrichmentsByContributionsRequest {
  repeated string contribution_ids = 1;
}

message GetEnrichmentsByContributionsResponse {
  repeated Enrichment enrichments = 1;
}

message GetEnrichmentPipelineStatusRequest {}

message GetEnrichmentPipelineStatusResponse {
  // Number of contributions awaiting enrichment.
  int64 pending_count = 1;
  // Total enrichments generated to date.
  int64 total_enrichments = 2;
  // When the most recent enrichment was created.
  optional google.protobuf.Timestamp last_enrichment_at = 3;
  // Enrichment counts broken down by type.
  repeated EnrichmentTypeCount by_type = 4;
}

// EnrichmentTypeCount is a count of enrichments for a single type.
message EnrichmentTypeCount {
  EnrichmentType enrichment_type = 1;
  int64 count = 2;
}

message DeleteEnrichmentsByTypeRequest {
  // Kind of enrichment to delete.
  EnrichmentType enrichment_type = 1;
}

message DeleteEnrichmentsByTypeResponse {
  int64 deleted_count = 1;
}

message FindSimilarRequest {
  // Contribution ID to find similar items for.
  string contribution_id = 1;
  // Maximum number of results (default 10, max 50).
  int32 limit = 2;
  // Filter results by platform. UNSPECIFIED returns all platforms.
  Platform platform = 3;
  // Filter by platform instance (e.g. "ubuntu" for Discourse).
  optional string platform_instance = 4;
}

message SearchByTextRequest {
  // Free-text semantic search query.
  string query_text = 1;
  // Maximum number of results (default 10, max 50).
  int32 limit = 2;
  // Filter results by platform. UNSPECIFIED returns all platforms.
  Platform platform = 3;
  // Filter by platform instance (e.g. "ubuntu" for Discourse).
  optional string platform_instance = 4;
}

// SimilarItem represents a contribution found via semantic similarity search.
message SimilarItem {
  string contribution_id = 1;
  string title = 2;
  // Platform this contribution was ingested from.
  Platform platform = 3;
  ContributionType contribution_type = 4;
  ContributionState state = 5;
  // Instance identifier for multi-instance platforms.
  optional string platform_instance = 10;
  string author_name = 6;
  // URL on the external platform.
  string external_url = 7;
  // Cosine distance from the query (0 = identical).
  double distance = 8;
  // When this contribution was created.
  google.protobuf.Timestamp created_at = 9;
}

message FindSimilarResponse {
  repeated SimilarItem items = 1;
}

message SearchByTextResponse {
  repeated SimilarItem items = 1;
}

message GetEmbeddingStatusRequest {}

message GetEmbeddingStatusResponse {
  // Number of contributions awaiting embedding generation.
  int64 queued_count = 1;
  // Number of contributions with embeddings.
  int64 embedded_count = 2;
  // Total contributions eligible for embedding.
  int64 total_eligible = 3;
  // When the most recent embedding was generated.
  optional google.protobuf.Timestamp last_embedded_at = 4;
  // Percentage of eligible contributions with embeddings (0.0–100.0).
  double coverage_percent = 5;
}

// ---------------------------------------------------------------------------
// Agentic query interface
// ---------------------------------------------------------------------------

message AskQuestionRequest {
  // The natural-language question.
  string question = 1;
  // Optional conversation ID to resume. If omitted, a new conversation starts.
  optional string conversation_id = 2;
  // If set, overrides the admin-configured agentic model for this query.
  // Format: "provider/model_id" (e.g. "google/gemini-2.5-flash").
  optional string model_override = 3;
}

message ResumeStreamRequest {
  string conversation_id = 1;
  // Resume from this event cursor. 0 replays all events from the start.
  int64 last_event_id = 2;
}

// ResumeStreamResponse carries the same event types as AskQuestionResponse,
// used when reconnecting to an in-flight query.
message ResumeStreamResponse {
  oneof event {
    AgentToolCallStarted tool_call_started = 1;
    AgentToolCallCompleted tool_call_completed = 2;
    AgentPartialAnswer partial_answer = 3;
    AgentFinalAnswer final_answer = 4;
    AgentError error = 5;
    AgentThinking thinking = 6;
    AgentContainerStatus container_status = 7;
    AgentArtifactUploaded artifact_uploaded = 8;
    AgentTokenUsage token_usage = 9;
  }
}

// AskQuestionResponse is a server-streamed event emitted during an agentic query.
message AskQuestionResponse {
  oneof event {
    AgentToolCallStarted tool_call_started = 1;
    AgentToolCallCompleted tool_call_completed = 2;
    AgentPartialAnswer partial_answer = 3;
    AgentFinalAnswer final_answer = 4;
    AgentError error = 5;
    AgentThinking thinking = 6;
    AgentContainerStatus container_status = 7;
    AgentArtifactUploaded artifact_uploaded = 8;
    // Sent as the first event when a new conversation is created or resumed.
    AgentConversationCreated conversation_created = 9;
    AgentTokenUsage token_usage = 10;
  }
}

// AgentToolCallStarted indicates the agent is invoking a tool.
message AgentToolCallStarted {
  // Tool name (e.g. "mcp_prism_list_teams", "bash", "read").
  string tool_name = 1;
  // Serialised arguments as JSON.
  string arguments_json = 2;
  // Unique identifier for this tool call (used to correlate start/complete and deduplicate updates).
  string call_id = 3;
  // Server-assigned stable identity for this step.
  string step_id = 4;
  // Server-assigned display order (monotonically increasing per conversation).
  int32 step_seq = 5;
}

// AgentToolCallCompleted indicates a tool call has finished.
message AgentToolCallCompleted {
  string tool_name = 1;
  // Truncated result summary for display.
  string result_summary = 2;
  // Duration in milliseconds.
  int32 duration_ms = 3;
  // Whether the tool call succeeded.
  bool success = 4;
  // Unique identifier for this tool call (correlates with AgentToolCallStarted.call_id).
  string call_id = 5;
  // Server-assigned stable identity for this step.
  string step_id = 6;
  // Server-assigned display order (monotonically increasing per conversation).
  int32 step_seq = 7;
}

// AgentPartialAnswer streams incremental text of the agent's response.
message AgentPartialAnswer {
  // Accumulated text so far (not a delta — full text up to this point).
  string text = 1;
}

// AgentThinking indicates the agent is reasoning (e.g. extended thinking).
message AgentThinking {
  string text = 1;
  // Part index from the underlying SSE stream — identifies which reasoning
  // block this update belongs to so the client can properly interleave
  // reasoning and tool-call steps without clobbering earlier blocks.
  int32 part_index = 2;
  // Server-assigned stable identity for this reasoning block.
  string step_id = 3;
  // Server-assigned display order (monotonically increasing per conversation).
  int32 step_seq = 4;
}

// AgentFinalAnswer is the completed response with metadata.
message AgentFinalAnswer {
  // Complete Markdown answer.
  string answer = 1;
  // Conversation ID (for follow-up questions).
  string conversation_id = 2;
  // Serialised citations/supporting data as JSON.
  string supporting_data_json = 3;
  int32 prompt_tokens = 4;
  int32 completion_tokens = 5;
  double estimated_cost_usd = 6;
  int32 tool_call_count = 7;
  int32 duration_ms = 8;
  // Artifacts generated during this turn.
  repeated ArtifactInfo artifacts = 9;
}

// AgentError indicates an error during processing.
message AgentError {
  string message = 1;
  // Whether the client can retry the question.
  bool retryable = 2;
}

// AgentConversationCreated is sent as the first stream event, providing the
// conversation ID so the client can update the URL and sidebar immediately.
message AgentConversationCreated {
  string conversation_id = 1;
  // Initial title (truncated question).
  string title = 2;
}

// AgentContainerStatus reports container lifecycle progress.
message AgentContainerStatus {
  // Container status: "creating", "pulling_image", "starting", "ready", "error".
  string status = 1;
  string message = 2;
}

// AgentArtifactUploaded indicates an artifact was uploaded to S3 during the turn.
message AgentArtifactUploaded {
  string artifact_id = 1;
  string display_name = 2;
  string content_type = 3;
  int64 size_bytes = 4;
  string download_url = 5;
}

// AgentTokenUsage reports cumulative token consumption for a conversation turn,
// enabling the client to display context window utilization.
message AgentTokenUsage {
  // Cumulative input tokens consumed in this conversation.
  int64 input_tokens = 1;
  // Cumulative output tokens consumed in this conversation.
  int64 output_tokens = 2;
  // Model's maximum context window size in tokens.
  int64 context_window = 3;
}

// ArtifactInfo describes an artifact attached to a conversation response.
message ArtifactInfo {
  string id = 1;
  string display_name = 2;
  string content_type = 3;
  int64 size_bytes = 4;
}

// ---------------------------------------------------------------------------
// Conversation management
// ---------------------------------------------------------------------------

message ListConversationsRequest {
  int32 page_size = 1;
  int32 page = 2;
}

message ListConversationsResponse {
  repeated ConversationSummary conversations = 1;
  int32 total_count = 2;
}

// ConversationSummary is a lightweight view for the conversation list.
message ConversationSummary {
  string id = 1;
  optional string title = 2;
  string status = 3;
  string model_name = 4;
  string container_status = 5;
  int32 total_tool_calls = 6;
  float total_estimated_cost_usd = 7;
  int32 message_count = 8;
  int32 artifact_count = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp last_activity_at = 11;
  // Query lifecycle status: 'idle', 'pending', 'running', 'completed', 'failed', 'cancelled'.
  string query_status = 12;
}

message GetConversationRequest {
  string conversation_id = 1;
}

message GetConversationResponse {
  ConversationSummary conversation = 1;
  repeated ConversationMessage messages = 2;
  repeated ConversationArtifact artifacts = 3;
}

// ConversationMessage is a single turn in a conversation.
message ConversationMessage {
  string id = 1;
  // "user" or "assistant".
  string role = 2;
  // Message content (Markdown for assistant messages).
  string content = 3;
  // Tool call trace as JSON (assistant messages only).
  optional string reasoning_trace_json = 4;
  // Citation data as JSON (assistant messages only).
  optional string supporting_data_json = 5;
  int32 prompt_tokens = 6;
  int32 completion_tokens = 7;
  google.protobuf.Timestamp created_at = 8;
}

// ConversationArtifact is a file generated during a conversation.
message ConversationArtifact {
  string id = 1;
  optional string message_id = 2;
  string artifact_key = 3;
  string display_name = 4;
  optional string content_type = 5;
  int64 size_bytes = 6;
  google.protobuf.Timestamp created_at = 7;
}

message SaveInsightFromConversationRequest {
  // The conversation the insight was derived from.
  string conversation_id = 1;
  // The specific message to save as an insight.
  string message_id = 2;
  // Human-provided title for the insight.
  string title = 3;
}

message SaveInsightFromConversationResponse {
  // ID of the created insight snapshot.
  string insight_id = 1;
}

message DeleteConversationRequest {
  string conversation_id = 1;
}

message DeleteConversationResponse {}

message RenameConversationRequest {
  string conversation_id = 1;
  // New title for the conversation.
  string title = 2;
}

message RenameConversationResponse {}

message GetArtifactDownloadUrlRequest {
  string artifact_id = 1;
}

message GetArtifactDownloadUrlResponse {
  // Pre-signed S3 download URL.
  string download_url = 1;
  // Seconds until the URL expires.
  int32 expires_in_seconds = 2;
}
