syntax = "proto3";

package prism.v1;

import "google/protobuf/timestamp.proto";

service MetricsService {
  rpc GetTeamMetrics(GetTeamMetricsRequest) returns (GetTeamMetricsResponse);
  rpc CompareTeams(CompareTeamsRequest) returns (CompareTeamsResponse);
  rpc ListPeriods(ListPeriodsRequest) returns (ListPeriodsResponse);
  rpc ListTeamContributions(ListTeamContributionsRequest) returns (ListTeamContributionsResponse);

  // Phase 2: individual profile and flow metrics
  rpc GetIndividualProfile(GetIndividualProfileRequest) returns (GetIndividualProfileResponse);
  rpc ListPersonContributions(ListPersonContributionsRequest) returns (ListPersonContributionsResponse);
  rpc GetFlowMetrics(GetFlowMetricsRequest) returns (GetFlowMetricsResponse);
}

enum PeriodType {
  PERIOD_TYPE_UNSPECIFIED = 0;
  PERIOD_TYPE_WEEK = 1;
  PERIOD_TYPE_MONTH = 2;
  PERIOD_TYPE_QUARTER = 3;
}

message Period {
  PeriodType type = 1;
  string start = 2;
  string end = 3;
}

message TeamMetrics {
  string team_id = 1;
  string team_name = 2;
  Period period = 3;
  int32 throughput = 4;
  float avg_review_turnaround_hours = 5;
  int32 member_count = 6;
  map<string, string> raw_metrics = 7;
  float review_turnaround_p75_hours = 8;
  float review_turnaround_p90_hours = 9;
  float review_turnaround_p99_hours = 10;
  // Phase 2 flow metrics (populated when Jira data is available)
  float avg_cycle_time_hours = 11;
  float wip_avg = 12;
  float flow_efficiency = 13;
  float lead_time_hours = 14;
  // Platforms contributing data to this snapshot
  repeated string source_platforms = 15;
}

message GetTeamMetricsRequest {
  string team_id = 1;
  Period period = 2;
}

message GetTeamMetricsResponse {
  TeamMetrics metrics = 1;
}

message CompareTeamsRequest {
  repeated string team_ids = 1;
  Period period = 2;
}

message CompareTeamsResponse {
  repeated TeamMetrics metrics = 1;
}

message ListPeriodsRequest {}

message ListPeriodsResponse {
  repeated Period periods = 1;
}

message ListTeamContributionsRequest {
  string team_id = 1;
  Period period = 2;
  // Filter by contribution type: "pull_request", "pr_review", "jira_ticket", etc.
  optional string contribution_type = 3;
  // Filter by state: "merged", "open", "closed", "in_progress", "APPROVED", etc.
  optional string state = 4;
  int32 page_size = 5;
  int32 page_index = 6;
  optional string sort_field = 7;
  optional bool sort_desc = 8;
  // Free-text search across title, author, and repo.
  optional string search = 9;
}

message Contribution {
  string id = 1;
  string person_name = 2;
  string platform = 3;
  string contribution_type = 4;
  string platform_id = 5;
  string title = 6;
  string url = 7;
  string state = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp closed_at = 10;
  int32 additions = 11;
  int32 deletions = 12;
  int32 changed_files = 13;
  int32 review_count = 14;
  float review_hours = 15;
  string repo = 16;
}

message ListTeamContributionsResponse {
  repeated Contribution contributions = 1;
  int32 total_count = 2;
}

// ---------------------------------------------------------------------------
// Phase 2: Individual profile
// ---------------------------------------------------------------------------

message GetIndividualProfileRequest {
  string person_id = 1;
  Period period = 2;
}

message GetIndividualProfileResponse {
  string person_id = 1;
  string name = 2;
  string team_name = 3;
  string level = 4;
  repeated PlatformIdentityInfo identities = 5;
  repeated PlatformActivitySummary activity_by_platform = 6;
  PeerComparison peer_context = 7;
}

message PlatformIdentityInfo {
  string platform = 1;
  string username = 2;
}

message PlatformActivitySummary {
  // Platform identifier: "github", "jira", "discourse-ubuntu", etc.
  string platform = 1;
  int32 contribution_count = 2;
  // Flexible key-value metrics per platform.
  map<string, double> metrics = 3;
}

message PeerComparison {
  string level = 1;
  int32 peer_count = 2;
  map<string, Percentile> metrics = 3;
}

message Percentile {
  double value = 1;
  // 0.0–1.0
  double percentile = 2;
}

// ---------------------------------------------------------------------------
// Phase 2: Person contributions
// ---------------------------------------------------------------------------

message ListPersonContributionsRequest {
  string person_id = 1;
  // Filter by platform: "github", "jira", "discourse-ubuntu", etc.
  optional string platform = 2;
  // Filter by contribution type.
  optional string contribution_type = 3;
  // Only contributions created on or after this date (YYYY-MM-DD).
  optional string since = 4;
  int32 page_size = 5;
  int32 page_index = 6;
  optional string sort_field = 7;
  optional bool sort_desc = 8;
}

message ListPersonContributionsResponse {
  repeated Contribution contributions = 1;
  int32 total_count = 2;
}

// ---------------------------------------------------------------------------
// Phase 2: Flow metrics
// ---------------------------------------------------------------------------

message GetFlowMetricsRequest {
  string team_id = 1;
  Period period = 2;
}

message GetFlowMetricsResponse {
  double avg_cycle_time_hours = 1;
  double wip_average = 2;
  int32 throughput = 3;
  double flow_efficiency = 4;
  double lead_time_hours = 5;
  repeated ThroughputDataPoint throughput_trend = 6;
  repeated WipDataPoint wip_trend = 7;
}

message ThroughputDataPoint {
  string date = 1;
  int32 count = 2;
  // Break down by source (optional).
  string source = 3;
}

message WipDataPoint {
  string date = 1;
  double wip = 2;
}
