syntax = "proto3";

package prism.v1;

service ReasoningService {
  // AI Settings
  rpc GetAiSettings(GetAiSettingsRequest) returns (GetAiSettingsResponse);
  rpc UpdateAiSettings(UpdateAiSettingsRequest) returns (UpdateAiSettingsResponse);
  rpc SetProviderSecret(SetProviderSecretRequest) returns (SetProviderSecretResponse);
  rpc TestProvider(TestProviderRequest) returns (TestProviderResponse);
  rpc GetStorageHealth(GetStorageHealthRequest) returns (GetStorageHealthResponse);

  // Cost Dashboard
  rpc GetCostSummary(GetCostSummaryRequest) returns (GetCostSummaryResponse);

  // Model Catalogue
  rpc ListAiModels(ListAiModelsRequest) returns (ListAiModelsResponse);
  rpc RefreshModelCatalogue(RefreshModelCatalogueRequest) returns (RefreshModelCatalogueResponse);

  // Enrichments
  rpc GetEnrichments(GetEnrichmentsRequest) returns (GetEnrichmentsResponse);
  rpc GetEnrichmentsByContributions(GetEnrichmentsByContributionsRequest) returns (GetEnrichmentsByContributionsResponse);
  rpc GetEnrichmentPipelineStatus(GetEnrichmentPipelineStatusRequest) returns (GetEnrichmentPipelineStatusResponse);
  rpc DeleteEnrichmentsByType(DeleteEnrichmentsByTypeRequest) returns (DeleteEnrichmentsByTypeResponse);

  // Similarity (embeddings)
  rpc FindSimilar(FindSimilarRequest) returns (FindSimilarResponse);
  rpc SearchByText(SearchByTextRequest) returns (SearchByTextResponse);
  rpc GetEmbeddingStatus(GetEmbeddingStatusRequest) returns (GetEmbeddingStatusResponse);
}

// ---------------------------------------------------------------------------
// AI Settings
// ---------------------------------------------------------------------------

message AiTaskConfig {
  string provider = 1; // "google" or "openrouter"
  string model = 2;    // e.g. "gemini-3.1-flash-lite"
}

message AiSettings {
  AiTaskConfig enrichment = 1;
  AiTaskConfig insights = 2;
  AiTaskConfig agentic = 3;
  AiTaskConfig embeddings = 4;
  optional double budget_cap_usd = 5;
  map<string, bool> provider_secret_status = 6; // which providers have keys set
}

message GetAiSettingsRequest {}

message GetAiSettingsResponse {
  AiSettings settings = 1;
}

message UpdateAiSettingsRequest {
  optional AiTaskConfig enrichment = 1;
  optional AiTaskConfig insights = 2;
  optional AiTaskConfig agentic = 3;
  optional AiTaskConfig embeddings = 4;
  optional double budget_cap_usd = 5;
}

message UpdateAiSettingsResponse {
  AiSettings settings = 1;
}

message SetProviderSecretRequest {
  string provider = 1;  // "google" or "openrouter"
  string secret_value = 2;
}

message SetProviderSecretResponse {}

message TestProviderRequest {
  string provider = 1; // "google" or "openrouter"
}

message TestProviderResponse {
  bool success = 1;
  string error_message = 2;
}

message GetStorageHealthRequest {}

message GetStorageHealthResponse {
  bool healthy = 1;
  string error_message = 2;
}

// ---------------------------------------------------------------------------
// Model Catalogue
// ---------------------------------------------------------------------------

message AiModelInfo {
  string id = 1;
  string provider = 2;
  string display_name = 3;
  string description = 4;
  int32 context_length = 5;
  optional double input_price_per_million = 6;
  optional double output_price_per_million = 7;
  repeated string capabilities = 8;
}

message ListAiModelsRequest {
  string provider = 1;     // filter by provider (empty = all)
  string capability = 2;   // filter by capability (empty = all)
}

message ListAiModelsResponse {
  repeated AiModelInfo models = 1;
  map<string, string> last_refreshed = 2; // provider → ISO timestamp
}

message RefreshModelCatalogueRequest {}

message RefreshModelCatalogueResponse {
  bool started = 1;
}

// ---------------------------------------------------------------------------
// Cost Dashboard
// ---------------------------------------------------------------------------

message GetCostSummaryRequest {
  // Number of days to include (default 7)
  int32 days = 1;
}

message GetCostSummaryResponse {
  double today_spend_usd = 1;
  optional double budget_cap_usd = 2;
  repeated DailySpend daily_spend = 3;
  repeated TaskSpend task_breakdown = 4;
  repeated ModelSpend model_breakdown = 5;
}

message DailySpend {
  string date = 1; // ISO 8601 date
  double cost_usd = 2;
  int64 request_count = 3;
}

message TaskSpend {
  string task_type = 1;
  double cost_usd = 2;
  int64 prompt_tokens = 3;
  int64 completion_tokens = 4;
  int64 request_count = 5;
}

message ModelSpend {
  string provider = 1;
  string model = 2;
  string task_type = 3;
  double cost_usd = 4;
  int64 prompt_tokens = 5;
  int64 completion_tokens = 6;
  int64 request_count = 7;
}

// ---------------------------------------------------------------------------
// Enrichments
// ---------------------------------------------------------------------------

message Enrichment {
  string id = 1;
  string contribution_id = 2;
  string enrichment_type = 3;     // "review_depth", "sentiment", "significance", "topic"
  string value_json = 4;          // structured JSON result (score, label, rationale)
  string model_name = 5;
  optional float confidence = 6;
  optional string input_hash = 7;
  optional string input_preview = 8;
  string created_at = 9;          // ISO 8601 timestamp
}

message GetEnrichmentsRequest {
  string contribution_id = 1;
}

message GetEnrichmentsResponse {
  repeated Enrichment enrichments = 1;
}

message GetEnrichmentsByContributionsRequest {
  repeated string contribution_ids = 1;
}

message GetEnrichmentsByContributionsResponse {
  repeated Enrichment enrichments = 1;
}

message GetEnrichmentPipelineStatusRequest {}

message GetEnrichmentPipelineStatusResponse {
  int64 pending_count = 1;
  int64 total_enrichments = 2;
  optional string last_enrichment_at = 3;  // ISO 8601 timestamp
  repeated EnrichmentTypeCount by_type = 4;
}

message EnrichmentTypeCount {
  string enrichment_type = 1;
  int64 count = 2;
}

message DeleteEnrichmentsByTypeRequest {
  string enrichment_type = 1;
}

message DeleteEnrichmentsByTypeResponse {
  int64 deleted_count = 1;
}

// ---------------------------------------------------------------------------
// Similarity (embeddings)
// ---------------------------------------------------------------------------

message FindSimilarRequest {
  string contribution_id = 1;
  int32 limit = 2;             // default 10, max 50
  optional string platform = 3; // filter results by platform
}

message SearchByTextRequest {
  string query_text = 1;
  int32 limit = 2;              // default 10, max 50
  optional string platform = 3;  // filter results by platform
}

message SimilarItem {
  string contribution_id = 1;
  string title = 2;
  string platform = 3;
  string contribution_type = 4;
  string state = 5;
  string author_name = 6;
  string external_url = 7;
  double distance = 8;          // cosine distance (0 = identical)
  string created_at = 9;        // ISO 8601 timestamp
}

message FindSimilarResponse {
  repeated SimilarItem items = 1;
}

message SearchByTextResponse {
  repeated SimilarItem items = 1;
}

message GetEmbeddingStatusRequest {}

message GetEmbeddingStatusResponse {
  int64 queued_count = 1;
  int64 embedded_count = 2;
  int64 total_eligible = 3;
  optional string last_embedded_at = 4;  // ISO 8601 timestamp
  double coverage_percent = 5;           // embedded / total_eligible * 100
}
