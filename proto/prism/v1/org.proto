syntax = "proto3";

package prism.v1;

service OrgService {
  rpc ListTeams(ListTeamsRequest) returns (ListTeamsResponse);
  rpc GetTeam(GetTeamRequest) returns (GetTeamResponse);
  rpc GetTeamTree(GetTeamTreeRequest) returns (GetTeamTreeResponse);
  rpc CreateTeam(CreateTeamRequest) returns (CreateTeamResponse);
  rpc UpdateTeam(UpdateTeamRequest) returns (UpdateTeamResponse);
  rpc DeleteTeam(DeleteTeamRequest) returns (DeleteTeamResponse);
  rpc ListPeople(ListPeopleRequest) returns (ListPeopleResponse);
  rpc ImportDirectory(ImportDirectoryRequest) returns (ImportDirectoryResponse);
  rpc UpdatePerson(UpdatePersonRequest) returns (UpdatePersonResponse);
  rpc DeactivatePerson(DeactivatePersonRequest) returns (DeactivatePersonResponse);
  rpc ReactivatePerson(ReactivatePersonRequest) returns (ReactivatePersonResponse);
  rpc AssignPersonToTeam(AssignPersonToTeamRequest) returns (AssignPersonToTeamResponse);
  rpc RemovePersonFromTeam(RemovePersonFromTeamRequest) returns (RemovePersonFromTeamResponse);
  rpc ListUnassignedPeople(ListUnassignedPeopleRequest) returns (ListUnassignedPeopleResponse);
}

enum TeamType {
  TEAM_TYPE_UNSPECIFIED = 0;
  TEAM_TYPE_ORG = 1;
  TEAM_TYPE_GROUP = 2;
  TEAM_TYPE_TEAM = 3;
  TEAM_TYPE_SQUAD = 4;
}

message Team {
  string id = 1;
  string name = 2;
  string org_name = 3;
  optional string parent_team_id = 4;
  optional string lead_id = 5;
  optional string github_team_slug = 6;
  int32 member_count = 7;
  TeamType team_type = 8;
  int32 total_member_count = 9;
  repeated Team children = 10;
  optional string lead_name = 11;
}

message Person {
  string id = 1;
  string name = 2;
  optional string email = 3;
  optional string level = 4;
  repeated PlatformIdentity identities = 5;
  bool active = 6;
  optional string team_name = 7;
  optional string team_id = 8;
}

message PlatformIdentity {
  string platform = 1;
  string username = 2;
}

message ListTeamsRequest {
  optional string parent_team_id = 1;
  optional TeamType team_type = 2;
}

message ListTeamsResponse {
  repeated Team teams = 1;
}

message GetTeamRequest {
  string team_id = 1;
}

message GetTeamResponse {
  Team team = 1;
  repeated Person members = 2;
}

message GetTeamTreeRequest {}

message GetTeamTreeResponse {
  repeated Team roots = 1;
}

message CreateTeamRequest {
  string name = 1;
  TeamType team_type = 2;
  optional string parent_team_id = 3;
  optional string lead_id = 4;
  optional string github_team_slug = 5;
  string org_name = 6;
}

message CreateTeamResponse {
  Team team = 1;
}

message UpdateTeamRequest {
  string team_id = 1;
  optional string name = 2;
  optional string parent_team_id = 3;
  optional string lead_id = 4;
  optional string github_team_slug = 5;
}

message UpdateTeamResponse {
  Team team = 1;
}

message DeleteTeamRequest {
  string team_id = 1;
}

message DeleteTeamResponse {}

message ListPeopleRequest {
  optional bool active_only = 1;
}

message ListPeopleResponse {
  repeated Person people = 1;
}

message ImportDirectoryRequest {
  bytes file_content = 1;
}

message ImportDirectoryResponse {
  int32 people_imported = 1;
  int32 teams_created = 2;
  int32 identities_mapped = 3;
  repeated string warnings = 4;
  int32 people_updated = 5;
  int32 stale_people_count = 6;
  int32 unassigned_count = 7;
}

message UpdatePersonRequest {
  string person_id = 1;
  optional string name = 2;
  optional string email = 3;
  optional string level = 4;
}

message UpdatePersonResponse {
  Person person = 1;
}

message DeactivatePersonRequest {
  string person_id = 1;
}

message DeactivatePersonResponse {}

message ReactivatePersonRequest {
  string person_id = 1;
}

message ReactivatePersonResponse {}

message AssignPersonToTeamRequest {
  string person_id = 1;
  string team_id = 2;
}

message AssignPersonToTeamResponse {}

message RemovePersonFromTeamRequest {
  string person_id = 1;
  string team_id = 2;
}

message RemovePersonFromTeamResponse {}

message ListUnassignedPeopleRequest {}

message ListUnassignedPeopleResponse {
  repeated Person people = 1;
}
