# Envoy Gateway resources for localhost routing.
# Requires: Envoy Gateway CRDs installed in the cluster.
#
# Install CRDs:
#   helm install eg oci://docker.io/envoyproxy/gateway-helm \
#     --version v1.2.6 -n envoy-gateway-system --create-namespace
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: prism
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: prism-gateway
spec:
  gatewayClassName: prism
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
spec:
  parentRefs:
    - name: prism-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /prism.v1
      backendRefs:
        - name: ps-server
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 3000
