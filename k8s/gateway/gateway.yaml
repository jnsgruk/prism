# Envoy Gateway resources for localhost routing.
# Requires: Envoy Gateway CRDs installed in the cluster.
#
# Install CRDs:
#   helm install eg oci://docker.io/envoyproxy/gateway-helm \
#     --version v1.2.6 -n envoy-gateway-system --create-namespace
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: prism
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
