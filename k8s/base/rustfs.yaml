apiVersion: v1
kind: Service
metadata:
  name: rustfs
spec:
  selector:
    app: rustfs
  ports:
    - port: 9000
      targetPort: 9000
      name: s3
    - port: 9001
      targetPort: 9001
      name: console
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rustfs
spec:
  serviceName: rustfs
  replicas: 1
  selector:
    matchLabels:
      app: rustfs
  template:
    metadata:
      labels:
        app: rustfs
    spec:
      containers:
        - name: rustfs
          image: rustfs/rustfs:latest
          args:
            - server
            - /data
            - --address
            - "0.0.0.0:9000"
            - --console-address
            - "0.0.0.0:9001"
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: RUSTFS_ROOT_USER
              value: prism
            - name: RUSTFS_ROOT_PASSWORD
              value: prism-dev-password
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
