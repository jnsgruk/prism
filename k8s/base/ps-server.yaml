apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prism-workspaces
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ps-server
spec:
  selector:
    app: ps-server
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ps-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ps-server
  template:
    metadata:
      labels:
        app: ps-server
    spec:
      serviceAccountName: ps-server
      containers:
        - name: ps-server
          image: prism/ps-server
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: prism-secrets
                  key: DATABASE_URL
            - name: PS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: prism-secrets
                  key: PS_SECRET_KEY
            - name: PORT
              value: "8080"
            - name: RESTATE_URL
              value: http://restate:8080
            - name: RESTATE_ADMIN_URL
              value: http://restate:9070
            - name: WORKSPACES_PATH
              value: /workspaces
            - name: RUST_LOG
              value: info
          volumeMounts:
            - name: workspaces
              mountPath: /workspaces
              readOnly: true
          readinessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
      volumes:
        - name: workspaces
          persistentVolumeClaim:
            claimName: prism-workspaces
            readOnly: true
