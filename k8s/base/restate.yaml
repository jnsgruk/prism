apiVersion: v1
kind: Service
metadata:
  name: restate
spec:
  selector:
    app: restate
  ports:
    - name: ingress
      port: 8080
      targetPort: 8080
    - name: admin
      port: 9070
      targetPort: 9070
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: restate
spec:
  serviceName: restate
  replicas: 1
  selector:
    matchLabels:
      app: restate
  template:
    metadata:
      labels:
        app: restate
    spec:
      containers:
        - name: restate
          image: docker.io/restatedev/restate:1.6
          ports:
            - containerPort: 8080
            - containerPort: 9070
          env:
            - name: RESTATE_DEFAULT_NUM_PARTITIONS
              value: "4"
            - name: RESTATE_DEFAULT_JOURNAL_RETENTION
              value: "7d"
            - name: RESTATE_WORKER__INVOKER__ABORT_TIMEOUT
              value: "2min"
            # How long Restate waits before re-invoking a suspended handler
            # when completions arrive. The default (60s) causes visible stalls
            # in the pipeline UI between stages (e.g. ingestion finishing and
            # metrics starting) because the workflow handler suspends while
            # awaiting join_all completions, and Restate queues the completion
            # notifications until this timer fires. 5s is fine for a
            # single-tenant deployment with a small handler count.
            - name: RESTATE_WORKER__INVOKER__INACTIVITY_TIMEOUT
              value: "5s"
          volumeMounts:
            - name: restate-data
              mountPath: /restate-data
          resources:
            requests:
              memory: 2Gi
              cpu: 100m
            limits:
              memory: 4Gi
  volumeClaimTemplates:
    - metadata:
        name: restate-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
