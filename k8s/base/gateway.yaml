---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: prism-gateway
spec:
  gatewayClassName: prism
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: api-route
spec:
  parentRefs:
    - name: prism-gateway
  rules:
    - backendRefs:
        - name: ps-server
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
spec:
  parentRefs:
    - name: prism-gateway
  rules:
    - backendRefs:
        - name: ps-frontend
          port: 3000
