---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: prism-gateway
spec:
  gatewayClassName: prism
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
spec:
  parentRefs:
    - name: prism-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      # Disable the default request timeout for long-lived gRPC streams
      # (agent SSE, server-streaming RPCs).
      timeouts:
        request: "0s"
      backendRefs:
        - name: ps-server
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
spec:
  parentRefs:
    - name: prism-gateway
  rules:
    - backendRefs:
        - name: ps-frontend
          port: 3000
