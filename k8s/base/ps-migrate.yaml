apiVersion: batch/v1
kind: Job
metadata:
  name: ps-migrate
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:17
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U prism; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: ps-migrate
          image: prism/ps-migrate
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: prism-secrets
                  key: DATABASE_URL
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
