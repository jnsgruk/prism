apiVersion: v1
kind: Service
metadata:
  name: ps-workers
spec:
  selector:
    app: ps-workers
  ports:
    - name: health
      port: 9080
      targetPort: 9080
    - name: restate
      port: 9081
      targetPort: 9081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ps-workers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ps-workers
  template:
    metadata:
      labels:
        app: ps-workers
    spec:
      containers:
        - name: ps-workers
          image: prism/ps-workers
          ports:
            - containerPort: 9080
            - containerPort: 9081
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: prism-secrets
                  key: DATABASE_URL
            - name: PS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: prism-secrets
                  key: PS_SECRET_KEY
            - name: RESTATE_URL
              value: http://restate:8080
            - name: RUST_LOG
              value: info,ps_workers=debug,ps_core=debug
          resources:
            requests:
              memory: 1Gi
              cpu: 100m
            limits:
              memory: 2Gi
